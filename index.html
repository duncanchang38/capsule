<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capsule</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #212121;
      color: #ececec;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 1.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #ececec;
      border-bottom: 1px solid #2f2f2f;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      max-width: 48rem;
      width: 100%;
      margin: 0 auto;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      max-width: 100%;
    }

    .message.user {
      align-items: flex-end;
    }

    .message.assistant {
      align-items: flex-start;
    }

    .bubble {
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      line-height: 1.6;
      font-size: 0.95rem;
      max-width: 80%;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #2f2f2f;
      border-bottom-right-radius: 0.25rem;
    }

    .message.assistant .bubble {
      background: transparent;
      border-bottom-left-radius: 0.25rem;
      padding-left: 0;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #ececec;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    #input-area {
      padding: 1rem;
      border-top: 1px solid #2f2f2f;
    }

    #input-wrap {
      max-width: 48rem;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      background: #2f2f2f;
      border-radius: 1rem;
      padding: 0.75rem 1rem;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #ececec;
      font-size: 0.95rem;
      font-family: inherit;
      resize: none;
      max-height: 10rem;
      line-height: 1.5;
    }

    #input::placeholder {
      color: #666;
    }

    #send {
      background: #ececec;
      border: none;
      border-radius: 0.5rem;
      width: 2rem;
      height: 2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #send:hover { background: #ccc; }
    #send:disabled { background: #444; cursor: default; }

    #send svg { width: 1rem; height: 1rem; }
  </style>
</head>
<body>

  <header>Capsule</header>

  <div id="messages"></div>

  <div id="input-area">
    <div id="input-wrap">
      <textarea id="input" rows="1" placeholder="Type anything..."></textarea>
      <button id="send">
        <svg viewBox="0 0 24 24" fill="none" stroke="#212121" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    function addMessage(role) {
      const msg = document.createElement("div");
      msg.className = `message ${role}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;

      addMessage("user").textContent = text;

      const bubble = addMessage("assistant");
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      bubble.appendChild(cursor);

      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: text }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = line.slice(6);
          if (data === "[DONE]") break;
          try {
            const { text } = JSON.parse(data);
            bubble.insertBefore(document.createTextNode(text), cursor);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } catch {}
        }
      }

      cursor.remove();
      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener("click", send);

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = inputEl.scrollHeight + "px";
    });
  </script>

</body>
</html>
